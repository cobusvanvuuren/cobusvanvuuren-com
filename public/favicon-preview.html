<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CVV Favicon Options</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,200;1,200&display=swap" rel="stylesheet">
<style>
  body { background: #1a1a1a; display: flex; gap: 40px; padding: 60px; font-family: sans-serif; align-items: flex-start; flex-wrap: wrap; }
  .option { text-align: center; }
  .label { color: #888; font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase; margin-top: 16px; margin-bottom: 4px; }
  .sublabel { color: #555; font-size: 11px; }
  .fav { width: 64px; height: 64px; display: block; margin: 0 auto; }
  .fav-sm { width: 32px; height: 32px; display: block; margin: 8px auto 0; }
  .fav-tiny { width: 16px; height: 16px; display: block; margin: 4px auto 0; }
</style>
</head>
<body>

<!-- Option A: CVV Monogram on Obsidian -->
<div class="option">
  <svg class="fav" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
    <rect width="64" height="64" fill="#0B0A09" rx="10"/>
    <text x="32" y="44" font-family="Cormorant, Georgia, serif" font-weight="200" font-size="26" fill="#F5F0E8" text-anchor="middle" letter-spacing="2">CVV</text>
  </svg>
  <svg class="fav-sm" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
    <rect width="64" height="64" fill="#0B0A09" rx="10"/>
    <text x="32" y="44" font-family="Cormorant, Georgia, serif" font-weight="200" font-size="26" fill="#F5F0E8" text-anchor="middle" letter-spacing="2">CVV</text>
  </svg>
  <svg class="fav-tiny" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
    <rect width="64" height="64" fill="#0B0A09" rx="10"/>
    <text x="32" y="44" font-family="Cormorant, Georgia, serif" font-weight="200" font-size="26" fill="#F5F0E8" text-anchor="middle" letter-spacing="2">CVV</text>
  </svg>
  <div class="label">A — CVV Monogram</div>
  <div class="sublabel">Obsidian · Ivory serif · Brand recommended</div>
</div>

<!-- Option B: Crimson Diamond (current) -->
<div class="option">
  <svg class="fav" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
    <rect width="64" height="64" fill="#0B0A09" rx="10"/>
    <rect x="18" y="18" width="28" height="28" fill="#C8282C" rx="2" transform="rotate(45 32 32)"/>
    <rect x="22" y="22" width="20" height="20" fill="none" stroke="rgba(247,240,232,0.12)" stroke-width="1.5" rx="1.5" transform="rotate(45 32 32)"/>
  </svg>
  <svg class="fav-sm" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
    <rect width="64" height="64" fill="#0B0A09" rx="10"/>
    <rect x="18" y="18" width="28" height="28" fill="#C8282C" rx="2" transform="rotate(45 32 32)"/>
    <rect x="22" y="22" width="20" height="20" fill="none" stroke="rgba(247,240,232,0.12)" stroke-width="1.5" rx="1.5" transform="rotate(45 32 32)"/>
  </svg>
  <svg class="fav-tiny" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
    <rect width="64" height="64" fill="#0B0A09" rx="10"/>
    <rect x="18" y="18" width="28" height="28" fill="#C8282C" rx="2" transform="rotate(45 32 32)"/>
  </svg>
  <div class="label">B — Crimson Diamond</div>
  <div class="sublabel">Current · Obsidian · Crimson</div>
</div>

<!-- Option C: CVV on Crimson -->
<div class="option">
  <svg class="fav" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
    <rect width="64" height="64" fill="#C8282C" rx="10"/>
    <text x="32" y="44" font-family="Cormorant, Georgia, serif" font-weight="200" font-size="26" fill="#F5F0E8" text-anchor="middle" letter-spacing="2">CVV</text>
  </svg>
  <svg class="fav-sm" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
    <rect width="64" height="64" fill="#C8282C" rx="10"/>
    <text x="32" y="44" font-family="Cormorant, Georgia, serif" font-weight="200" font-size="26" fill="#F5F0E8" text-anchor="middle" letter-spacing="2">CVV</text>
  </svg>
  <svg class="fav-tiny" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
    <rect width="64" height="64" fill="#C8282C" rx="10"/>
    <text x="32" y="44" font-family="Cormorant, Georgia, serif" font-weight="200" font-size="26" fill="#F5F0E8" text-anchor="middle" letter-spacing="2">CVV</text>
  </svg>
  <div class="label">C — CVV on Crimson</div>
  <div class="sublabel">Bold · High visibility · Use sparingly</div>
</div>

<!-- Option D: Diamond + CVV combined -->
<div class="option">
  <svg class="fav" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
    <rect width="64" height="64" fill="#0B0A09" rx="10"/>
    <rect x="18" y="18" width="28" height="28" fill="none" stroke="#C8282C" stroke-width="2" rx="1.5" transform="rotate(45 32 32)"/>
    <text x="32" y="37" font-family="Cormorant, Georgia, serif" font-weight="200" font-size="14" fill="#F5F0E8" text-anchor="middle" letter-spacing="1">CVV</text>
  </svg>
  <svg class="fav-sm" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
    <rect width="64" height="64" fill="#0B0A09" rx="10"/>
    <rect x="18" y="18" width="28" height="28" fill="none" stroke="#C8282C" stroke-width="2" rx="1.5" transform="rotate(45 32 32)"/>
    <text x="32" y="37" font-family="Cormorant, Georgia, serif" font-weight="200" font-size="14" fill="#F5F0E8" text-anchor="middle" letter-spacing="1">CVV</text>
  </svg>
  <svg class="fav-tiny" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
    <rect width="64" height="64" fill="#0B0A09" rx="10"/>
    <rect x="18" y="18" width="28" height="28" fill="none" stroke="#C8282C" stroke-width="2.5" rx="1.5" transform="rotate(45 32 32)"/>
  </svg>
  <div class="label">D — Diamond + CVV</div>
  <div class="sublabel">Combined · Outline diamond · CVV inside</div>
</div>

<p style="color:#444;font-size:11px;width:100%;margin-top:20px;">Sizes shown: 64px · 32px · 16px (actual browser tab size)</p>
</body>
</html>
